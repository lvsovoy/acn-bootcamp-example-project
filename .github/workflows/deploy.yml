name: Deploy to Self-Hosted Runner

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  build-and-deploy:
    runs-on: self-hosted
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven

    - name: Extract deployment information
      id: deployment-info
      run: |
        BRANCH=${GITHUB_REF#refs/heads/}
        COMMIT=$(git rev-parse --short HEAD)
        TIMESTAMP=$(date -u +'%Y-%m-%d %H:%M:%S UTC')
        
        echo "branch=$BRANCH" >> $GITHUB_OUTPUT
        echo "commit=$COMMIT" >> $GITHUB_OUTPUT
        echo "timestamp=$TIMESTAMP" >> $GITHUB_OUTPUT
        
        echo "Deployment Info:"
        echo "  Branch: $BRANCH"
        echo "  Commit: $COMMIT"
        echo "  Timestamp: $TIMESTAMP"

    - name: Build with Maven
      run: mvn clean package -DskipTests

    - name: Stop existing application (if running)
      continue-on-error: true
      run: |
        PID=$(lsof -ti:3100) && kill $PID || true
        sleep 2

    - name: Start application
      env:
        SERVER_PORT: ${{ env.SERVER_PORT || '3100' }}
        DEPLOYMENT_BRANCH: ${{ steps.deployment-info.outputs.branch }}
        DEPLOYMENT_COMMIT: ${{ steps.deployment-info.outputs.commit }}
        DEPLOYMENT_TIMESTAMP: ${{ steps.deployment-info.outputs.timestamp }}
      run: |
        nohup java -jar target/acn-bootcamp-app-1.0.0.jar > app.log 2>&1 &
        sleep 5
        echo "Application started on port $SERVER_PORT"

    - name: Verify deployment
      run: |
        for i in {1..10}; do
          if curl -f http://localhost:3100/ > /dev/null 2>&1; then
            echo "Application is running and healthy"
            exit 0
          fi
          echo "Attempt $i: Waiting for application to start..."
          sleep 2
        done
        echo "Failed to start application"
        cat app.log
        exit 1

    - name: Display application logs
      if: always()
      run: tail -20 app.log || true
